{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "spki-fingerprint-exporter.fullname" . }}
  labels:
    {{- include "spki-fingerprint-exporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "spki-fingerprint-exporter.selectorLabels" . | nindent 6 }}
  # Only ingress is restricted; egress stays open because the exporter
  # probes arbitrary TLS targets.
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
