name: Release

# Fully automated release: trigger it manually from the Actions tab and
# everything else happens automatically. The next version is derived
# from conventional commits since the last stable tag (override via the
# bump input), the Helm chart version is updated and committed, the tag
# is created, binaries are built and attached to a GitHub release with
# generated release notes, multi-arch Docker images are pushed with
# SLSA provenance and SBOM attestations, and the Helm chart is
# published to ghcr.io as an OCI artifact. Images and chart are signed
# with cosign (keyless, via the GitHub OIDC identity).

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump (auto derives it from conventional commits)"
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
        default: auto

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

env:
  GO_VERSION: '1.24'
  DOCKER_IMAGES: |
    basa/spki-fingerprint-exporter
    ghcr.io/${{ github.repository }}

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run tests
        run: make test

  version:
    name: Bump version and tag
    needs: test
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.version }}
      version: ${{ steps.strip.outputs.version }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Compute next version and render release notes
        id: bump
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --bump=${{ inputs.bump }} --unreleased --strip all --output RELEASE_NOTES.md
      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: RELEASE_NOTES.md
      - name: Strip v prefix
        id: strip
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ steps.bump.outputs.version }}
      - name: Update Helm chart version
        run: |
          sed -i \
            -e "s/^version:.*/version: ${VERSION}/" \
            -e "s/^appVersion:.*/appVersion: \"${VERSION}\"/" \
            helm/Chart.yaml
        env:
          VERSION: ${{ steps.strip.outputs.version }}
      - name: Commit, tag and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add helm/Chart.yaml
          git commit -m "chore(release): ${TAG}"
          git tag "${TAG}"
          git push --atomic origin HEAD "refs/tags/${TAG}"
        env:
          TAG: ${{ steps.bump.outputs.version }}

  build:
    name: Build
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag }}
          # Full history so git describe resolves the exact tag
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: azure/setup-helm@v5
        with:
          version: v3.18.4
      - name: Build for all platforms and create checksums
        run: make checksums
      - name: Validate and package Helm chart
        run: |
          helm lint --strict ./helm
          helm template release ./helm
          helm template release ./helm \
            --set serviceMonitor.enabled=true \
            --set-string serviceMonitor.targets[0]=example.com:443 \
            --set prometheusRule.enabled=true
          helm package ./helm --destination dist
          sha256sum dist/*.tgz | sed 's|dist/||' >> dist/sha256sums.txt
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            dist/spki-fingerprint-exporter-linux-*
            dist/spki-fingerprint-exporter-netbsd-*
            dist/spki-fingerprint-exporter-openbsd-*
            dist/spki-fingerprint-exporter-windows-*
            dist/spki-fingerprint-exporter-darwin-*
            dist/sha256sums.txt
            dist/*.tgz

  release:
    name: Create Release
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist
      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/spki-fingerprint-exporter-linux-*
            dist/spki-fingerprint-exporter-netbsd-*
            dist/spki-fingerprint-exporter-openbsd-*
            dist/spki-fingerprint-exporter-windows-*
            dist/spki-fingerprint-exporter-darwin-*
            dist/sha256sums.txt
            dist/*.tgz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  helm:
    name: Push Helm Chart
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # For cosign keyless signing
      id-token: write
    steps:
      - uses: azure/setup-helm@v5
        with:
          version: v3.18.4
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist
      - name: Push chart to GitHub Container Registry
        run: |
          helm registry login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin <<< "${GITHUB_TOKEN}"
          helm push dist/spki-fingerprint-exporter-*.tgz \
            "oci://ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts" &> push.log
          cat push.log
          echo "digest=$(awk '/Digest:/ {print $2}' push.log)" >> "$GITHUB_OUTPUT"
        id: push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # cosign reads registry credentials from the Docker config, which
      # helm registry login does not write.
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign chart with cosign (keyless)
        # Legacy signature format: ghcr rejects the OCI-referrers pushes
        # of the cosign v3 default bundle format, and the default signing
        # config requires the bundle format, so disable both.
        run: |
          cosign sign --yes --use-signing-config=false --new-bundle-format=false \
            "ghcr.io/${GITHUB_REPOSITORY_OWNER}/charts/spki-fingerprint-exporter@${DIGEST}"
        env:
          DIGEST: ${{ steps.push.outputs.digest }}

  docker:
    name: Build and Push Docker Images
    needs: [version, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # For cosign keyless signing
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.version.outputs.tag }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: binaries
          path: dist
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.DOCKER_IMAGES }}
          # Plain version tag (no v prefix): the Helm chart defaults the
          # image tag to the plain appVersion.
          tags: |
            type=raw,value=${{ needs.version.outputs.version }}
            type=raw,value=latest
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile.release
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SLSA provenance and SBOM attestations
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Sign images with cosign (keyless)
        # Legacy signature format: ghcr rejects the OCI-referrers pushes
        # of the cosign v3 default bundle format, and the default signing
        # config requires the bundle format, so disable both.
        run: |
          while IFS= read -r image; do
            [ -z "$image" ] && continue
            echo "Signing ${image}@${DIGEST}"
            cosign sign --yes --use-signing-config=false --new-bundle-format=false "${image}@${DIGEST}"
          done <<< "${DOCKER_IMAGES}"
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
