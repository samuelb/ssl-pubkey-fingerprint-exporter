{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "spki-fingerprint-exporter.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "spki-fingerprint-exporter.name" . }}
    helm.sh/chart: {{ include "spki-fingerprint-exporter.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "spki-fingerprint-exporter.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  # Only ingress is restricted; egress stays open because the exporter
  # probes arbitrary TLS targets.
  policyTypes:
    - Ingress
  ingress:
    - ports:
        - protocol: TCP
          port: {{ .Values.containerPort }}
      {{- with .Values.networkPolicy.ingressFrom }}
      from:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
