{{- if .Values.ingress.enabled -}}
{{- if not .Values.ingress.hosts -}}
{{- fail "ingress.hosts must contain at least one host when ingress is enabled" -}}
{{- end -}}
{{- range .Values.ingress.hosts -}}
{{- if not .paths -}}
{{- fail (printf "ingress host %q must contain at least one path" .host) -}}
{{- end -}}
{{- end -}}
{{- $fullName := include "spki-fingerprint-exporter.fullname" . -}}
{{- $apiVersion := include "spki-fingerprint-exporter.ingress.apiVersion" . -}}
apiVersion: {{ $apiVersion }}
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    app.kubernetes.io/name: {{ include "spki-fingerprint-exporter.name" . }}
    helm.sh/chart: {{ include "spki-fingerprint-exporter.chart" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
{{- if .Values.ingress.tls }}
  tls:
  {{- range .Values.ingress.tls }}
    - hosts:
      {{- range .hosts }}
        - {{ . | quote }}
      {{- end }}
      secretName: {{ .secretName }}
  {{- end }}
{{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
        {{- range .paths }}
          - path: {{ . }}
            {{- if eq $apiVersion "networking.k8s.io/v1" }}
            pathType: {{ $.Values.ingress.pathType | default "ImplementationSpecific" }}
            backend:
              service:
                name: {{ $fullName }}
                port:
                  name: http
            {{- else }}
            backend:
              serviceName: {{ $fullName }}
              servicePort: http
            {{- end }}
        {{- end }}
  {{- end }}
{{- end }}
