# Default values for spki-fingerprint-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: basa/spki-fingerprint-exporter
  tag: ""
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a dedicated ServiceAccount for the exporter.
  create: true
  annotations: {}
  # Name of the ServiceAccount to use. Defaults to the fullname when
  # create is true, and to "default" otherwise.
  name: ""
  # The exporter needs no Kubernetes API access, so the API token is not
  # mounted into the pod.
  automount: false

service:
  type: ClusterIP
  port: 3000

# Port the exporter listens on inside the container. The chart derives the
# LISTEN_ADDRESS environment variable from this value.
containerPort: 3000

# Optional interface/address to bind. The container port is always appended.
listenHost: ""

healthProbes:
  livenessPath: /-/healthy
  readinessPath: /-/ready

# Additional environment variables for the exporter container, e.g.:
# env:
#   - name: DEFAULT_TIMEOUT
#     value: "10"
# LISTEN_ADDRESS is managed by the chart and must not be repeated here.
env: []

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Create a ServiceMonitor for the Prometheus Operator. Each target is
# probed via the /probe endpoint.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}
  # Also scrape the exporter's own /metrics endpoint (operational metrics
  # such as spki_fingerprint_exporter_probes_total).
  selfMonitor: true
  # targets:
  #   - example.com:443
  #   - https://example.org
  targets: []

ingress:
  enabled: false
  # ImplementationSpecific matches the behavior of the legacy
  # extensions/v1beta1 ingress (e.g. NGINX regex paths keep working).
  pathType: ImplementationSpecific
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - /

  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
