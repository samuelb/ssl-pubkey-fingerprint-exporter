name: Test

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.23", "1.24"]
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12

  helm:
    name: Helm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        helm-version: [v3.18.4, v4.2.0]
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: ${{ matrix.helm-version }}
      - name: Lint chart
        run: helm lint ./helm
      - name: Render default chart
        run: helm template test ./helm
      - name: Render configured chart on Kubernetes 1.19
        run: >-
          helm template test ./helm
          --kube-version 1.19.0
          --set ingress.enabled=true
          --set ingress.hosts[0].host=example.test
          --set ingress.hosts[0].paths[0]=/
          --set serviceMonitor.enabled=true
          --set serviceMonitor.targets[0]=example.com:443
          --set prometheusRule.enabled=true
      - name: Render legacy ingress on Kubernetes 1.13
        run: >-
          helm template test ./helm
          --kube-version 1.13.0
          --set ingress.enabled=true
          --set ingress.hosts[0].host=example.test
          --set ingress.hosts[0].paths[0]=/

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
