name: Sign release artifacts

# Recovery tool: sign the already-published container images and Helm
# chart of a release with cosign keyless and verify the signatures.
# Useful when the release pipeline failed after pushing the artifacts
# but before signing them.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to sign (without v prefix, e.g. 0.7.0)"
        required: true

permissions:
  contents: read

jobs:
  sign:
    name: Sign and verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # For cosign keyless signing
      id-token: write
    env:
      REFS: |
        basa/spki-fingerprint-exporter:${{ inputs.version }}
        ghcr.io/${{ github.repository }}:${{ inputs.version }}
        ghcr.io/${{ github.repository_owner }}/charts/spki-fingerprint-exporter:${{ inputs.version }}
    steps:
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Sign artifacts
        # Legacy signature format: ghcr rejects the OCI-referrers pushes
        # of the cosign v3 default bundle format, and the default signing
        # config requires the bundle format, so disable both.
        run: |
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            echo "::group::Signing ${ref}"
            cosign sign --yes --use-signing-config=false --new-bundle-format=false "$ref"
            echo "::endgroup::"
          done <<< "${REFS}"
      - name: Verify signatures
        run: |
          while IFS= read -r ref; do
            [ -z "$ref" ] && continue
            echo "::group::Verifying ${ref}"
            cosign verify --new-bundle-format=false \
              --certificate-identity-regexp "^https://github.com/${GITHUB_REPOSITORY}/\.github/workflows/.+" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$ref"
            echo "::endgroup::"
          done <<< "${REFS}"
