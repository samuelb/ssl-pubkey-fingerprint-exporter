name: Test

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25", "1.26"]
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Check formatting
        run: test -z "$(gofmt -l .)" || (gofmt -l . && exit 1)
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build -v ./...
      - name: Test
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12

  helm:
    name: Helm
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        helm-version: [v3.18.4, v4.2.0]
    steps:
      - uses: actions/checkout@v7
      - uses: azure/setup-helm@v5
        with:
          version: ${{ matrix.helm-version }}
      - name: Lint chart
        run: helm lint ./helm
      - name: Render default chart
        run: helm template test ./helm
      - name: Render configured chart on Kubernetes 1.19
        run: >-
          helm template test ./helm
          --kube-version 1.19.0
          --set ingress.enabled=true
          --set ingress.hosts[0].host=example.test
          --set ingress.hosts[0].paths[0]=/
          --set serviceMonitor.enabled=true
          --set serviceMonitor.targets[0]=example.com:443
          --set prometheusRule.enabled=true
      - name: Render legacy ingress on Kubernetes 1.13
        run: >-
          helm template test ./helm
          --kube-version 1.13.0
          --set ingress.enabled=true
          --set ingress.hosts[0].host=example.test
          --set ingress.hosts[0].paths[0]=/

  chart-install:
    name: Chart install test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build linux/amd64 binary
        run: make linux/amd64
      - name: Build image
        run: >-
          docker build -f Dockerfile.release
          --build-arg TARGETOS=linux --build-arg TARGETARCH=amd64
          -t spki-fingerprint-exporter:ci .
      - name: Create kind cluster
        uses: helm/kind-action@v1
      - name: Load image into kind
        run: kind load docker-image spki-fingerprint-exporter:ci --name chart-testing
      - name: Install chart
        run: >-
          helm install test ./helm
          --set image.repository=spki-fingerprint-exporter
          --set-string image.tag=ci
          --set image.pullPolicy=Never
          --wait --timeout 120s
      - name: Probe the Kubernetes API server through the exporter
        # Run to completion and read the logs afterwards; kubectl run
        # --attach races against short-lived containers and can miss
        # their output entirely.
        run: |
          kubectl run probe --image=curlimages/curl --restart=Never --command -- \
            curl -sf 'http://test-spki-fingerprint-exporter:3000/probe?target=kubernetes.default.svc:443'
          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/probe --timeout=60s
          kubectl logs probe | tee probe.out
          grep -q 'probe_success 1' probe.out
      - name: Print exporter state on failure
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl describe deployment test-spki-fingerprint-exporter
          kubectl logs deployment/test-spki-fingerprint-exporter --all-containers || true
          kubectl describe pod probe || true
          kubectl logs probe || true

  govulncheck:
    name: Govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          go-package: ./...
