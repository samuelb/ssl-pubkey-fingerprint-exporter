# Default values for spki-fingerprint-exporter.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: basa/spki-fingerprint-exporter
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
# - name: registry-credentials

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Create a dedicated ServiceAccount for the exporter.
  create: true
  annotations: {}
  # Name of the ServiceAccount to use. Defaults to the fullname when
  # create is true, and to "default" otherwise.
  name: ""
  # The exporter needs no Kubernetes API access, so the API token is not
  # mounted into the pod.
  automount: false

service:
  type: ClusterIP
  port: 3000
  annotations: {}

# Port the exporter listens on inside the container. The chart derives the
# LISTEN_ADDRESS environment variable from this value.
containerPort: 3000

# Optional interface/address to bind. The container port is always appended.
listenHost: ""

healthProbes:
  livenessPath: /-/healthy
  readinessPath: /-/ready

# Full livenessProbe/readinessProbe specs. When set, they replace the
# default httpGet probes built from healthProbes above, e.g.:
# livenessProbe:
#   httpGet:
#     path: /-/healthy
#     port: http
#   periodSeconds: 30
#   timeoutSeconds: 5
livenessProbe: {}
readinessProbe: {}

# Additional environment variables for the exporter container, e.g.:
# env:
#   - name: DEFAULT_TIMEOUT
#     value: "10"
# LISTEN_ADDRESS is managed by the chart and must not be repeated here.
env: []

# Additional annotations and labels for the pods.
podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Create a ServiceMonitor for the Prometheus Operator. Each target is
# probed via the /probe endpoint.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: 10s
  additionalLabels: {}
  # Also scrape the exporter's own /metrics endpoint (operational metrics
  # such as spki_fingerprint_exporter_probes_total).
  selfMonitor: true
  # targets:
  #   - example.com:443
  #   - https://example.org
  targets: []

# Create a PrometheusRule for the Prometheus Operator. The default rules
# alert on changed fingerprints, failing probes, and probes rejected by
# the concurrency limit; adjust them to your environment.
prometheusRule:
  enabled: false
  additionalLabels: {}
  rules:
    # A key rotation ends one spki_fingerprint series and starts another
    # (the fingerprint is a label), so a change shows up as more than one
    # series per target within the window.
    - alert: SpkiFingerprintChanged
      expr: count by (target) (count_over_time(spki_fingerprint[1h])) > 1
      labels:
        severity: critical
      annotations:
        summary: "SPKI fingerprint changed on {{ $labels.target }}"
        description: >-
          The public key presented by {{ $labels.target }} changed within
          the last hour. Investigate if this rotation was not expected.
    # probe_success is also exported by other blackbox-style exporters;
    # scope the expression by job if you run any.
    - alert: SpkiProbeFailed
      expr: probe_success == 0
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "SPKI probe failing for {{ $labels.instance }}"
        description: >-
          Probing {{ $labels.instance }} has been failing for 5 minutes;
          the target is unreachable or does not complete a TLS handshake.
    - alert: SpkiProbesRejected
      expr: increase(spki_fingerprint_exporter_rejected_probes_total[5m]) > 0
      labels:
        severity: warning
      annotations:
        summary: SPKI fingerprint exporter is rejecting probes
        description: >-
          The exporter hit its concurrency limit and rejected probes in
          the last 5 minutes; raise MAX_CONCURRENT_PROBES or reduce the
          number of targets.

ingress:
  enabled: false
  # ImplementationSpecific matches the behavior of the legacy
  # extensions/v1beta1 ingress (e.g. NGINX regex paths keep working).
  pathType: ImplementationSpecific
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - /

  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# Create a PodDisruptionBudget. Only useful with more than one replica;
# set either minAvailable or maxUnavailable.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# Create a NetworkPolicy that restricts ingress to the exporter port.
# Egress stays open because the exporter probes arbitrary TLS targets.
networkPolicy:
  enabled: false
  # Peers allowed to reach the exporter; everything may connect when
  # empty, e.g.:
  # ingressFrom:
  #   - namespaceSelector:
  #       matchLabels:
  #         kubernetes.io/metadata.name: monitoring
  ingressFrom: []

nodeSelector: {}

tolerations: []

affinity: {}

priorityClassName: ""

topologySpreadConstraints: []
# - maxSkew: 1
#   topologyKey: kubernetes.io/hostname
#   whenUnsatisfiable: ScheduleAnyway
#   labelSelector:
#     matchLabels:
#       app.kubernetes.io/name: spki-fingerprint-exporter
